```yaml
name: Compile Custom Hentoid APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Set up Java JDK Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant executable permissions to Gradle
      run: chmod +x gradlew

    - name: Assemble Debug Application Package (APK)
      run: ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hentoid-Custom-Build
        path: app/build/outputs/apk/debug/app-debug.apk
